<section class="todoapp">
    <header class="header">
      <div class="container">
        <h1>My Day</h1>
        <p>All my tasks in one place</p>
        <input
          class="new-todo"
          placeholder="Type new todo"
          autofocus
          type="text"
          [formControl]="newTaskControl"
          (keydown.enter)="changeHandler()"
        />
      </div>
    </header>
    <div class="container todoapp-wrapper">
      <!-- This section should be hidden by default and shown when there are todos -->
      <section class="main">
        <ul class="todo-list">
          @for (task of tasksByFilter(); track task; let i = $index) {
            <li
            [class.completed]="task.completed"
            [class.editing]="task.editing"
            (dblclick)="updateTaskEditingMode(i)"
            >
            <div class="view">
              <input
              class="toggle"
              type="checkbox"
              [checked]="task.completed"
              (change)="updateTask(i)"
              />
              <label>{{ task.title }}</label>
              <button
              class="destroy"
              (click)="deleteTask(i)"
              ></button>
            </div>
            <input
            class="edit"
            [value]="task.title"
            (keydown.enter)="updateTaskText(i, $event)"
            />
          </li>
          }
          <!-- <li class="completed">
            <div class="view">
              <input class="toggle" type="checkbox" checked />
              <label>Learn JavaScript</label>
              <button class="destroy"></button>
            </div>
            <input class="edit" value="Learn JavaScript" />
          </li>
          <li>
            <div class="view">
              <input class="toggle" type="checkbox" />
              <label>Buy a unicorn</label>
              <button class="destroy"></button>
            </div>
            <input class="edit" value="Buy a unicorn" />
          </li>
          <li class="editing">
            <div class="view">
              <input class="toggle" type="checkbox" />
              <label>Make dishes</label>
              <button class="destroy"></button>
            </div>
            <input class="edit" value="Make dishes" />
          </li> -->
        </ul>
      </section>
      <!-- This footer should be hidden by default and shown when there are todos -->
      <footer class="footer">
        <!-- This should be `0 items left` by default -->
        <span class="todo-count">
          <strong>{{ tasksByFilter().length }}</strong>
          @if (tasks().length >= 2) {
            <span> items</span>
          } @else {
            <span> item</span>
          }
        </span>
        <!-- Remove this if you don't implement routing -->
        <ul class="filters">
          <li>
            <a
            [class.selected]="filter() === 'all'"
            (click)="changeFilter('all')"
            >All</a>
          </li>
          <li>
            <a
            [class.selected]="filter() === 'pending'"
            (click)="changeFilter('pending')"
            >Pending</a>
          </li>
          <li>
            <a
            [class.selected]="filter() === 'completed'"
            (click)="changeFilter('completed')"
            >Completed</a>
          </li>
        </ul>
        <!-- Hidden if no completed items are left ↓ -->
        <button class="clear-completed">Clear completed</button>
      </footer>
    </div>
  </section>
